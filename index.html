<!DOCTYPE html>

<head>

    <title>NON-COMPLIANT | JIU JITSU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        .gothic { font-family: 'UnifrakturMaguntia', cursive; }
        .serif-title { font-family: 'Times New Roman', Times, serif; }
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        
        /* Custom styling for the dropdowns */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }

        /* Modal Styles */
        #imageModal.hidden { display: none; }
        #imageModal {
            display: flex;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-zinc-100 selection:bg-white selection:text-black">

    <div id="imageModal" class="hidden" onclick="closeModal()">

                    <img src="b79f5f4c-cd2f-42f9-b1f1-777cf63a45c0.jpg" alt="Hoodie" class="max-h-full object-contain group-hover:scale-105 transition-transform duration-700">

                        </select>

                            <option>Grey</option>
                            <option>Black</option>
                            <option>Navy</option>
                        </select>
                    </div>
                    <button class="w-full bg-white text-black py-3 text-[10px] font-black uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all">
                        Add to Registry
                    </button>
                </div>
            </div>

            <div class="group flex flex-col">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 border border-zinc-800 transition-colors group-hover:bg-white duration-500 cursor-zoom-in overflow-hidden" onclick="openModal(this)">
                    <img src="TShirt NYST front.jpg" alt="NYST Front Tee" class="max-h-full object-contain group-hover:scale-105 transition-transform duration-700">
                </div>
                <div class="py-6 flex flex-col gap-4">
                    <div class="flex justify-between items-baseline">
                        <h3 class="serif-title text-4xl italic">NYST Front Tee</h3>

                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <select class="bg-zinc-900 border border-zinc-800 text-[10px] font-black uppercase tracking-widest p-3 focus:outline-none focus:border-zinc-500 cursor-pointer">
                            <option disabled selected>SIZE</option>
                            <option>Men's S</option>
                            <option>Men's M</option>
                            <option>Men's L</option>
                            <option>Men's XL</option>
                        </select>
                        <select class="bg-zinc-900 border border-zinc-800 text-[10px] font-black uppercase tracking-widest p-3 focus:outline-none focus:border-zinc-500 cursor-pointer">

                        Add to Registry

            </div>

            <div class="group flex flex-col">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 border border-zinc-800 transition-colors group-hover:bg-white duration-500 cursor-zoom-in overflow-hidden" onclick="openModal(this)">
                    <img src="TShirt NYST.jpg" alt="NYST Rear Tee" class="max-h-full object-contain group-hover:scale-105 transition-transform duration-700">
                </div>
                <div class="py-6 flex flex-col gap-4">
                    <div class="flex justify-between items-baseline">
                        <h3 class="serif-title text-4xl italic">NYST Rear Tee</h3>
                        <span class="font-black italic text-xl">$15.00</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <select class="bg-zinc-900 border border-zinc-800 text-[10px] font-black uppercase tracking-widest p-3 focus:outline-none focus:border-zinc-500 cursor-pointer">
                            <option disabled selected>SIZE</option>
                            <option>Men's S</option>
                            <option>Men's M</option>
                            <option>Men's L</option>
                            <option>Men's XL</option>
                        </select>
                        <select class="bg-zinc-900 border border-zinc-800 text-[10px] font-black uppercase tracking-widest p-3 focus:outline-none focus:border-zinc-500 cursor-pointer">

                    <button class="w-full bg-white text-black py-3 text-[10px] font-black uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all">

                    </button>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-20 border-t border-zinc-900 text-center">
        <span class="gothic text-xl text-zinc-700 italic">Non-Compliant Jiu Jitsu</span>
        <p class="text-[8px] uppercase tracking-[0.5em] text-zinc-800 mt-4">© 2026 • New York / Standard</p>
    </footer>

    <script>
        function openModal(element) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            const clickedImg = element.querySelector('img').src;
            
            modalImg.src = clickedImg;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Prevents background scroll
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto'; // Re-enables scroll
        }
    </script>

</body>
</html>
