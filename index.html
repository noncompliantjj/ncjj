<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NonCompliant | JIU JITSU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        .gothic { font-family: 'UnifrakturMaguntia', cursive; }
        /* Forcing Times New Roman on everything else */
        body, button, select, p, h2, h3, span { 
            font-family: 'Times New Roman', Times, serif !important; 
        }
        body { background-color: #09090b; color: #f4f4f5; }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }

        #imageModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }
        #imageModal.active { display: flex; }
    </style>
</head>
<body class="selection:bg-white selection:text-black">

    <div id="imageModal" onclick="closeModal()">
        <img id="modalImg" src="" class="max-w-[90%] max-h-[90%] object-contain transition-transform duration-300">
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-zinc-950/80 backdrop-blur-md z-50">
        <span class="gothic text-2xl">NonCompliant</span>
        <div class="flex items-center gap-6">
            <div class="text-[10px] font-bold tracking-[0.3em] uppercase text-zinc-500 hidden md:block">NYST</div>
            <div class="bg-white text-black px-3 py-1 text-xs font-bold italic">
                CART: <span id="cartCount">0</span>
            </div>
        </div>
    </nav>

    <header class="py-20 px-6 flex flex-col items-center border-b border-zinc-900 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-zinc-900 via-zinc-950 to-zinc-950">
        <h1 class="gothic text-7xl md:text-9xl mb-6 text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] text-center">NonCompliant</h1>
        <p class="uppercase tracking-[0.5em] text-[10px] text-zinc-500 font-bold text-center italic">Equipment for the Uncompromising</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20">
        
        <div class="mb-12 border-b border-zinc-900 pb-4 flex justify-between items-end">
            <h2 class="text-[11px] uppercase tracking-[0.5em] text-zinc-500 font-bold">In-Stock Equipment</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            
            <div class="flex flex-col border border-zinc-800 bg-zinc-900/10 hover:border-zinc-600 transition-colors">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 cursor-zoom-in group overflow-hidden" onclick="openModal('b79f5f4c-cd2f-42f9-b1f1-777cf63a45c0.png')">
                    <img src="b79f5f4c-cd2f-42f9-b1f1-777cf63a45c0.png" alt="Essential Hoodie" class="max-h-full object-contain group-hover:scale-110 transition-transform duration-700">
                </div>
                <div class="p-8 flex flex-col gap-5 border-t border-zinc-800">
                    <div class="flex justify-between items-baseline">
                        <h3 class="text-4xl italic">Essential Hoodie</h3>
                        <span class="text-xl font-bold italic">$25.00</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <select class="size-select bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Men's S</option><option>Men's M</option><option>Men's L</option><option>Men's XL</option>
                        </select>
                        <select class="color-select bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Grey</option><option>Black</option><option>Navy</option>
                        </select>
                    </div>
                    <button onclick="addToCart('Essential Hoodie', this)" class="w-full bg-white text-black py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all active:scale-95">
                        Add to Registry
                    </button>
                </div>
            </div>

            <div class="flex flex-col border border-zinc-800 bg-zinc-900/10 hover:border-zinc-600 transition-colors">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 cursor-zoom-in group overflow-hidden" onclick="openModal('TShirt NYST front.png')">
                    <img src="TShirt NYST front.png" alt="NYST Front Tee" class="max-h-full object-contain group-hover:scale-110 transition-transform duration-700">
                </div>
                <div class="p-8 flex flex-col gap-5 border-t border-zinc-800">
                    <div class="flex justify-between items-baseline">
                        <h3 class="text-4xl italic">NYST Front Tee</h3>
                        <span class="text-xl font-bold italic">$15.00</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <select class="size-select bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Men's S</option><option>Men's M</option><option>Men's L</option><option>Men's XL</option>
                        </select>
                        <select class="color-select bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Grey</option><option>Black</option><option>Navy</option>
                        </select>
                    </div>
                    <button onclick="addToCart('NYST Front Tee', this)" class="w-full bg-white text-black py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all active:scale-95">
                        Add to Registry
                    </button>
                </div>
            </div>

            <div class="flex flex-col border border-zinc-800 bg-zinc-900/10 hover:border-zinc-600 transition-colors">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 cursor-zoom-in group overflow-hidden" onclick="openModal('TShirt NYST.png')">
                    <img src="TShirt NYST.png" alt="NYST Rear Tee" class="max-h-full object-contain group-hover:scale-110 transition-transform duration-700">
                </div>
                <div class="p-8 flex flex-col gap-5 border-t border-zinc-800">
                    <div class="flex justify-between items-baseline">
                        <h3 class="text-4xl italic">NYST Rear Tee</h3>
                        <span class="text-xl font-bold italic">$15.00</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <select class="size-select bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Men's S</option><option>Men's M</option><option>Men's L</option><option>Men's XL</option>
                        </select>
                        <select class="color-select bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Grey</option><option>Black</option><option>Navy</option>
                        </select>
                    </div>
                    <button onclick="addToCart('NYST Rear Tee', this)" class="w-full bg-white text-black py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all active:scale-95">
                        Add to Registry
                    </button>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-20 border-t border-zinc-900 text-center opacity-40">
        <span class="gothic text-xl">NonCompliant Jiu Jitsu</span>
        <p class="text-[8px] uppercase tracking-[0.5em] mt-4 italic font-bold">© 2026 • New York Standard</p>
    </footer>

    <script>
        // Cart Logic
        let count = 0;
        function addToCart(product, btn) {
            const container = btn.closest('.flex-col');
            const size = container.querySelector('.size-select').value;
            const color = container.querySelector('.color-select').value;
            
            count++;
            document.getElementById('cartCount').innerText = count;
            
            // Visual feedback on button
            const originalText = btn.innerText;
            btn.innerText = `ADDED: ${size} / ${color}`;
            btn.classList.replace('bg-white', 'bg-zinc-800');
            btn.classList.replace('text-black', 'text-white');
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-zinc-800', 'bg-white');
                btn.classList.replace('text-white', 'text-black');
            }, 2000);
        }

        // Modal Logic
        function openModal(imgSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modalImg.src = imgSrc;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
