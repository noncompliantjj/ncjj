<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NONCOMPLIANT | JIU JITSU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, button, select, p, h1, h2, h3, h4, span, div { 
            font-family: 'Times New Roman', Times, serif !important; 
        }
        
        body { background-color: #09090b; color: #f4f4f5; overflow-x: hidden; }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }

        #imageModal, #orderModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        #imageModal.active, #orderModal.active { display: flex; }

        #cartDrawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: #09090b;
            border-left: 1px solid #27272a;
            z-index: 2000;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }
        #cartDrawer.active { right: 0; }
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 1500;
        }
        .drawer-overlay.active { display: block; }
    </style>
</head>
