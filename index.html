<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NONCOMPLIANT | JIU JITSU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        .gothic { font-family: 'UnifrakturMaguntia', cursive; }
        /* Times New Roman Global Override */
        body, button, select, p, h2, h3, span, div { 
            font-family: 'Times New Roman', Times, serif !important; 
        }
        body { background-color: #09090b; color: #f4f4f5; overflow-x: hidden; }
        
        /* Custom Dropdown Styling */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }

        /* Lightbox Modal */
        #imageModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }
        #imageModal.active { display: flex; }

        /* Checkout Drawer */
        #cartDrawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: #09090b;
            border-left: 1px solid #27272a;
            z-index: 2000;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }
        #cartDrawer.active { right: 0; }
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 1500;
        }
        .drawer-overlay.active { display: block; }
    </style>
</head>
<body class="selection:bg-white selection:text-black">

    <div id="imageModal" onclick="closeModal()">
        <img id="modalImg" src="" class="max-w-[90%] max-h-[90%] object-contain">
    </div>

    <div id="cartOverlay" class="drawer-overlay" onclick="toggleCart()"></div>
    <div id="cartDrawer">
        <div class="flex justify-between items-center mb-12 border-b border-zinc-900 pb-4">
            <h2 class="text-2xl italic">Your Cart</h2>
            <button onclick="toggleCart()" class="text-xs tracking-widest uppercase opacity-50 hover:opacity-100">Close</button>
        </div>
        <div id="cartItems" class="flex-grow overflow-y-auto space-y-6 mb-8">
            <p class="text-zinc-600 italic">Your cart is empty.</p>
        </div>
        <div class="border-t border-zinc-900 pt-6">
            <div class="flex justify-between text-2xl mb-6">
                <span class="italic">Subtotal</span>
                <span id="subtotal">$0.00</span>
            </div>
            <button class="w-full bg-white text-black py-4 font-bold uppercase tracking-widest hover:bg-zinc-200 transition-all">
                Checkout
            </button>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-zinc-950/80 backdrop-blur-md z-50">
        <span class="gothic text-2xl !font-normal">NonCompliant</span>
        <div class="flex items-center gap-6">
            <div class="text-[10px] font-bold tracking-[0.3em] uppercase text-zinc-500 hidden md:block">NY • ST</div>
            <button onclick="toggleCart()" class="bg-white text-black px-4 py-2 text-xs font-bold italic flex gap-2 hover:bg-zinc-200 transition-colors">
                CART: <span id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <header class="py-24 px-6 flex flex-col items-center border-b border-zinc-900 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-zinc-900 via-zinc-950 to-zinc-950">
        <h1 class="gothic text-7xl md:text-9xl mb-6 text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] text-center !font-normal">NonCompliant</h1>
        <p class="uppercase tracking-[0.5em] text-[10px] text-zinc-500 font-bold text-center italic">Compliance Isn’t Voluntary</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20">
        
        <div class="mb-12 border-b border-zinc-900 pb-4 flex justify-between items-end">
            <h2 class="text-[11px] uppercase tracking-[0.5em] text-zinc-500 font-bold">NonCompliant Gear</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            
            <div class="flex flex-col border border-zinc-800 bg-zinc-900/10 hover:border-zinc-600 transition-colors">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 cursor-zoom-in group overflow-hidden" onclick="openModal('b79f5f4c-cd2f-42f9-b1f1-777cf63a45c0.png')">
                    <img src="b79f5f4c-cd2f-42f9-b1f1-777cf63a45c0.png" class="max-h-full object-contain group-hover:scale-110 transition-transform duration-700">
                </div>
                <div class="p-8 flex flex-col gap-5 border-t border-zinc-800">
                    <div class="flex justify-between items-baseline">
                        <h3 class="text-4xl italic">Essential Hoodie</h3>
                        <span class="text-xl font-bold italic">$25.00</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="size1" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Men's S</option><option>Men's M</option><option>Men's L</option><option>Men's XL</option>
                        </select>
                        <select id="color1" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Grey</option><option>Black</option><option>Navy</option>
                        </select>
                    </div>
                    <button onclick="addToCart('Essential Hoodie', 25, 'size1', 'color1', this)" class="w-full bg-white text-black py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all active:scale-95">
                        Add to Registry
                    </button>
                </div>
            </div>

            <div class="flex flex-col border border-zinc-800 bg-zinc-900/10 hover:border-zinc-600 transition-colors">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 cursor-zoom-in group overflow-hidden" onclick="openModal('TShirt NYST front.png')">
                    <img src="TShirt NYST front.png" class="max-h-full object-contain group-hover:scale-110 transition-transform duration-700">
                </div>
                <div class="p-8 flex flex-col gap-5 border-t border-zinc-800">
                    <div class="flex justify-between items-baseline">
                        <h3 class="text-4xl italic">NYST Front Tee</h3>
                        <span class="text-xl font-bold italic">$15.00</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="size2" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Men's S</option><option>Men's M</option><option>Men's L</option><option>Men's XL</option>
                        </select>
                        <select id="color2" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Grey</option><option>Black</option><option>Navy</option>
                        </select>
                    </div>
                    <button onclick="addToCart('NYST Front Tee', 15, 'size2', 'color2', this)" class="w-full bg-white text-black py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all active:scale-95">
                        Add to Registry
                    </button>
                </div>
            </div>

            <div class="flex flex-col border border-zinc-800 bg-zinc-900/10 hover:border-zinc-600 transition-colors">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 cursor-zoom-in group overflow-hidden" onclick="openModal('TShirt NYST.png')">
                    <img src="TShirt NYST.png" class="max-h-full object-contain group-hover:scale-110 transition-transform duration-700">
                </div>
                <div class="p-8 flex flex-col gap-5 border-t border-zinc-800">
                    <div class="flex justify-between items-baseline">
                        <h3 class="text-4xl italic">NYST Rear Tee</h3>
                        <span class="text-xl font-bold italic">$15.00</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="size3" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Men's S</option><option>Men's M</option><option>Men's L</option><option>Men's XL</option>
                        </select>
                        <select id="color3" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3 focus:border-zinc-400">
                            <option>Grey</option><option>Black</option><option>Navy</option>
                        </select>
                    </div>
                    <button onclick="addToCart('NYST Rear Tee', 15, 'size3', 'color3', this)" class="w-full bg-white text-black py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all active:scale-95">
                        Add to Registry
                    </button>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-20 border-t border-zinc-900 text-center opacity-40">
        <span class="gothic text-xl italic !font-normal">NonCompliant Jiu Jitsu</span>
        <p class="text-[8px] uppercase tracking-[0.5em] mt-4 italic font-bold">© 2026 • New York Standard</p>
    </footer>

    <script>
        let cart = [];
        
        function addToCart(name, price, sizeId, colorId, btn) {
            const size = document.getElementById(sizeId).value;
            const color = document.getElementById(colorId).value;
            
            cart.push({ name, price, size, color });
            updateCartUI();

            // Visual feedback
            const originalText = btn.innerText;
            btn.innerText = "ADDED TO CART";
            btn.classList.replace('bg-white', 'bg-zinc-800');
            btn.classList.replace('text-black', 'text-white');
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-zinc-800', 'bg-white');
                btn.classList.replace('text-white', 'text-black');
            }, 1500);
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const itemsContainer = document.getElementById('cartItems');
            const subtotalEl = document.getElementById('subtotal');
            
            itemsContainer.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-start border-b border-zinc-900 pb-4">
                        <div>
                            <p class="text-lg italic">${item.name}</p>
                            <p class="text-[10px] uppercase tracking-widest text-zinc-500">${item.size} / ${item.color}</p>
                        </div>
                        <p class="font-bold">$${item.price}.00</p>
                    </div>
                `;
            });

            if (cart.length === 0) {
                itemsContainer.innerHTML = '<p class="text-zinc-600 italic">Your cart is empty.</p>';
            }

            subtotalEl.innerText = `$${total}.00`;
        }

        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('active');
            document.getElementById('cartOverlay').classList.toggle('active');
        }

        function openModal(imgSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modalImg.src = imgSrc;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
