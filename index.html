<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NONCOMPLIANT | JIU JITSU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, button, select, p, h1, h2, h3, h4, span, div, input, label { 
            font-family: 'Times New Roman', Times, serif !important; 
        }
        
        body { background-color: #09090b; color: #f4f4f5; overflow-x: hidden; }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }

        #imageModal, #checkoutModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        #imageModal.active, #checkoutModal.active { display: flex; }

        #cartDrawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: #09090b;
            border-left: 1px solid #27272a;
            z-index: 2000;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }
        #cartDrawer.active { right: 0; }
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 1500;
        }
        .drawer-overlay.active { display: block; }
    </style>
</head>
<body class="selection:bg-white selection:text-black">

    <div id="imageModal" onclick="closeModal()">
        <img id="modalImg" src="" class="max-w-[90%] max-h-[90%] object-contain shadow-2xl cursor-zoom-out">
    </div>

    <div id="checkoutModal" class="p-6">
        <div class="w-full max-w-md bg-zinc-950 border border-zinc-800 p-8 shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8 border-b border-zinc-900 pb-4">
                <h2 class="text-2xl italic text-white">Finalize Registration</h2>
                <button onclick="closeCheckout()" class="text-[10px] uppercase tracking-widest opacity-50 hover:opacity-100 text-white">Cancel</button>
            </div>
            <form class="space-y-6" onsubmit="event.preventDefault(); alert('Order Submitted - Keep Training.');">
                <div>
                    <label class="block text-[10px] uppercase tracking-[0.2em] text-zinc-500 mb-2 font-bold">Full Name</label>
                    <input type="text" required class="w-full bg-zinc-900 border border-zinc-800 p-3 text-white focus:border-white outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-[0.2em] text-zinc-500 mb-2 font-bold">Phone Number</label>
                    <input type="tel" required class="w-full bg-zinc-900 border border-zinc-800 p-3 text-white focus:border-white outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-[0.2em] text-zinc-500 mb-2 font-bold">Email Address</label>
                    <input type="email" required class="w-full bg-zinc-900 border border-zinc-800 p-3 text-white focus:border-white outline-none transition-colors">
                </div>
                <div class="flex items-start gap-3 py-4">
                    <input type="checkbox" id="promise" required class="mt-1 accent-white w-4 h-4">
                    <label for="promise" class="text-sm italic text-zinc-400 select-none">I promise to train jiu jitsu.</label>
                </div>
                <button type="submit" class="w-full bg-white text-black py-4 font-bold uppercase tracking-widest hover:bg-zinc-200 transition-all">Submit Order</button>
            </form>
        </div>
    </div>

    <div id="cartOverlay" class="drawer-overlay" onclick="toggleCart()"></div>
    
    <div id="cartDrawer">
        <div class="flex justify-between items-center mb-12 border-b border-zinc-900 pb-4">
            <h2 class="text-2xl italic">Your Cart</h2>
            <button onclick="toggleCart()" class="text-xs tracking-widest uppercase opacity-50 hover:opacity-100">Close</button>
        </div>
        <div id="cartItems" class="flex-grow overflow-y-auto space-y-6 mb-8">
            <p class="text-zinc-600 italic">Your cart is empty.</p>
        </div>
        <div class="border-t border-zinc-900 pt-6">
            <div class="flex justify-between text-2xl mb-6">
                <span class="italic">Subtotal</span>
                <span id="subtotal">$0.00</span>
            </div>
            <button onclick="showCheckout()" class="w-full bg-white text-black py-4 font-bold uppercase tracking-widest hover:bg-zinc-200 transition-all">
                Checkout
            </button>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-zinc-950/80 backdrop-blur-md z-50">
        <img src="NonCompliant white.png" alt="NonCompliant Logo" class="h-6 object-contain">
        <div class="flex items-center gap-6">
            <div class="text-[10px] font-bold tracking-[0.3em] uppercase text-zinc-500 hidden md:block">NYST</div>
            <button onclick="toggleCart()" class="bg-white text-black px-4 py-2 text-xs font-bold italic flex gap-2 hover:bg-zinc-200 transition-colors">
                CART: <span id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <header class="py-24 px-6 flex flex-col items-center border-b border-zinc-900 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-zinc-900 via-zinc-950 to-zinc-950">
        <img src="NonCompliant white.png" alt="NonCompliant Banner Logo" class="w-full max-w-2xl mb-12 drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]">
        <p class="uppercase tracking-[0.5em] text-[10px] text-zinc-500 font-bold text-center italic">Encourage Compliance</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <div class="mb-12 border-b border-zinc-900 pb-4 flex justify-between items-end">
            <h2 class="text-[11px] uppercase tracking-[0.5em] text-zinc-500 font-bold">NonCompliant Gear</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            
            <div class="flex flex-col border border-zinc-800 bg-zinc-900/10 hover:border-zinc-600 transition-colors">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 cursor-zoom-in group overflow-hidden" onclick="openModal('b79f5f4c-cd2f-42f9-b1f1-777cf63a45c0.png')">
                    <img src="b79f5f4c-cd2f-42f9-b1f1-777cf63a45c0.png" class="max-h-full object-contain group-hover:scale-105 transition-transform duration-700">
                </div>
                <div class="p-8 flex flex-col gap-5 border-t border-zinc-800">
                    <div class="flex justify-between items-baseline">
                        <h3 class="text-xl italic">The Code Hoodie</h3>
                        <span class="text-xl font-bold italic">$25.00</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="size-code" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3">
                            <option>S</option><option>M</option><option>L</option><option>XL</option>
                        </select>
                        <select id="color-code" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3">
                            <option>Grey</option><option>Black</option><option>Navy</option>
                        </select>
                    </div>
                    <button onclick="addToCart('The Code Hoodie', 25, 'size-code', 'color-code', this)" class="w-full bg-white text-black py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all">
                        Add to Registry
                    </button>
                </div>
            </div>

            <div class="flex flex-col border border-zinc-800 bg-zinc-900/10 hover:border-zinc-600 transition-colors">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 cursor-zoom-in group overflow-hidden" onclick="openModal('Hoodie NYST.png')">
                    <img src="Hoodie NYST.png" class="max-h-full object-contain group-hover:scale-105 transition-transform duration-700">
                </div>
                <div class="p-8 flex flex-col gap-5 border-t border-zinc-800">
                    <div class="flex justify-between items-baseline">
                        <h3 class="text-xl italic">NonCompliant NYST Hoodie</h3>
                        <span class="text-xl font-bold italic">$25.00</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="size-nyst-h" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3">
                            <option>S</option><option>M</option><option>L</option><option>XL</option>
                        </select>
                        <select id="color-nyst-h" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3">
                            <option>Grey</option><option>Black</option><option>Navy</option>
                        </select>
                    </div>
                    <button onclick="addToCart('NonCompliant NYST Hoodie', 25, 'size-nyst-h', 'color-nyst-h', this)" class="w-full bg-white text-black py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all">
                        Add to Registry
                    </button>
                </div>
            </div>

            <div class="flex flex-col border border-zinc-800 bg-zinc-900/10 hover:border-zinc-600 transition-colors">
                <div class="aspect-square bg-[#f4f4f4] flex items-center justify-center p-8 cursor-zoom-in group overflow-hidden" onclick="openModal('noncompteryx hoodie colored.png')">
                    <img src="noncompteryx hoodie colored.png" class="max-h-full object-contain group-hover:scale-105 transition-transform duration-700">
                </div>
                <div class="p-8 flex flex-col gap-5 border-t border-zinc-800">
                    <div class="flex justify-between items-baseline">
                        <h3 class="text-xl italic">Non'Compteryx Hoodie</h3>
                        <span class="text-xl font-bold italic">$25.00</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="size-teryx-h" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3">
                            <option>S</option><option>M</option><option>L</option><option>XL</option>
                        </select>
                        <select id="color-teryx-h" class="bg-zinc-950 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest p-3">
                            <option>Grey</option><option>Black</option><option>Navy</option>
                        </select>
                    </div>
                    <button onclick="addToCart('Non\'Compteryx Hoodie', 25, 'size-teryx-h', 'color-teryx-h', this)" class="w-full bg-white text-black py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-all">
                        Add to Registry
                    </button>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-20 border-t border-zinc-900 text-center opacity-40">
        <img src="NonCompliant white.png" alt="NonCompliant Footer Logo" class="h-6 object-contain mx-auto mb-4">
        <p class="text-[8px] uppercase tracking-[0.5em] mt-2 italic font-bold">© 2026 • New York Standard</p>
    </footer>

    <script>
        let cart = {};

        function addToCart(name, price, sizeId, colorId, btn) {
            const size = document.getElementById(sizeId).value;
            const color = document.getElementById(colorId).value;
            const itemKey = `${name}-${size}-${color}`;

            if (cart[itemKey]) {
                cart[itemKey].quantity += 1;
            } else {
                cart[itemKey] = { name, price, size, color, quantity: 1 };
            }

            updateCartUI();

            const originalText = btn.innerText;
            btn.innerText = "ADDED TO CART";
            btn.classList.replace('bg-white', 'bg-zinc-800');
            btn.classList.replace('text-black', 'text-white');
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-zinc-800', 'bg-white');
                btn.classList.replace('text-white', 'text-black');
            }, 1500);
        }

        function updateQuantity(key, delta) {
            cart[key].quantity += delta;
            if (cart[key].quantity <= 0) delete cart[key];
            updateCartUI();
        }

        function updateCartUI() {
            const itemsContainer = document.getElementById('cartItems');
            const subtotalEl = document.getElementById('subtotal');
            const cartCount = document.getElementById('cartCount');
            
            itemsContainer.innerHTML = '';
            let total = 0;
            let count = 0;

            Object.keys(cart).forEach(key => {
                const item = cart[key];
                total += item.price * item.quantity;
                count += item.quantity;

                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-center border-b border-zinc-900 pb-4">
                        <div class="flex-grow">
                            <p class="text-sm italic">${item.name}</p>
                            <p class="text-[10px] uppercase tracking-widest text-zinc-500">${item.size} / ${item.color}</p>
                            <div class="flex items-center gap-3 mt-2">
                                <button onclick="updateQuantity('${key}', -1)" class="text-zinc-500 hover:text-white">-</button>
                                <span class="text-xs font-mono">${item.quantity}</span>
                                <button onclick="updateQuantity('${key}', 1)" class="text-zinc-500 hover:text-white">+</button>
                            </div>
                        </div>
                        <p class="font-bold">$${item.price * item.quantity}.00</p>
                    </div>
                `;
            });

            cartCount.innerText = count;
            subtotalEl.innerText = `$${total}.00`;
            if (count === 0) itemsContainer.innerHTML = '<p class="text-zinc-600 italic">Your cart is empty.</p>';
        }

        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('active');
            document.getElementById('cartOverlay').classList.toggle('active');
        }

        function showCheckout() {
            if (Object.keys(cart).length === 0) return alert("Your cart is empty.");
            document.getElementById('checkoutModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeCheckout() {
            document.getElementById('checkoutModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function openModal(imgSrc) {
            const modalImg = document.getElementById('modalImg');
            modalImg.src = imgSrc;
            document.getElementById('imageModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
