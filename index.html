<script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    updateCartUI();

    function saveCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    function addToCart(name, price, sizeId, colorId, btn) {
        const size = document.getElementById(sizeId).value;
        const color = document.getElementById(colorId).value;
        const existingIdx = cart.findIndex(i => i.name === name && i.size === size && i.color === color);

        if (existingIdx > -1) { 
            cart[existingIdx].quantity += 1; 
        } else { 
            cart.push({ name, price, size, color, quantity: 1 }); 
        }

        updateCartUI();
        saveCart();
        toggleCart(); // auto-open cart

        const originalText = btn.innerText;
        btn.innerText = "ADDED";
        btn.disabled = true;

        setTimeout(() => {
            btn.innerText = originalText;
            btn.disabled = false;
        }, 800);
    }

    function updateQuantity(index, delta) {
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) cart.splice(index, 1);
        updateCartUI();
        saveCart();
    }

    function updateCartUI() {
        const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cartCount').innerText = totalCount;

        const itemsContainer = document.getElementById('cartItems');
        const subtotalEl = document.getElementById('subtotal');
        const nextBtn = document.getElementById('checkoutNextBtn');

        itemsContainer.innerHTML = '';
        let total = 0;

        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;

            itemsContainer.innerHTML += `
                <div class="flex justify-between items-center border-b border-zinc-900 pb-4">
                    <div class="flex-grow">
                        <p class="text-sm italic uppercase">${item.name}</p>
                        <p class="text-[9px] uppercase tracking-widest text-zinc-500">${item.size} / ${item.color}</p>
                        <div class="flex items-center gap-4 mt-2">
                            <button onclick="updateQuantity(${index}, -1)" class="w-6 h-6 border border-zinc-800">-</button>
                            <span class="text-xs font-bold">${item.quantity}</span>
                            <button onclick="updateQuantity(${index}, 1)" class="w-6 h-6 border border-zinc-800">+</button>
                        </div>
                    </div>
                    <p class="font-bold ml-4">$${itemTotal.toFixed(2)}</p>
                </div>`;
        });

        if (cart.length === 0) {
            itemsContainer.innerHTML = '<p class="text-zinc-600 italic">Your cart is empty.</p>';
            nextBtn.disabled = true;
        } else {
            nextBtn.disabled = false;
        }

        subtotalEl.innerText = `$${total.toFixed(2)}`;
    }

    function showCheckoutForm() {
        document.getElementById('cartView').classList.add('hidden');
        document.getElementById('checkoutForm').classList.remove('hidden');
    }

    function hideCheckoutForm() {
        document.getElementById('cartView').classList.remove('hidden');
        document.getElementById('checkoutForm').classList.add('hidden');
    }

    function toggleCart() {
        document.getElementById('cartDrawer').classList.toggle('active');
        document.getElementById('cartOverlay').classList.toggle('active');
    }

    function openModal(imgSrc) {
        document.getElementById('modalImg').src = imgSrc;
        document.getElementById('imageModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('imageModal').classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    // --- FORMSPREE ---
    window.addEventListener('load', function() {
        window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };

        formspree('initForm', { 
            formElement: '#order-form', 
            formId: 'mgorgard',

            onSubmit: function() {
                if (cart.length === 0) {
                    alert("Cart is empty.");
                    return false;
                }

                // Clean formatted order
                const orderSummary = cart.map(i => 
                    `• ${i.quantity}x ${i.name} (${i.size}/${i.color})`
                ).join('\n');

                document.getElementById('order_details_input').value = orderSummary;
                document.getElementById('subtotal_input').value = document.getElementById('subtotal').innerText;

                // Prevent double submit
                document.querySelector('[data-fs-submit-btn]').disabled = true;
            },

            onSuccess: function() {
                cart = [];
                saveCart();
                updateCartUI();

                setTimeout(() => { 
                    toggleCart(); 
                    setTimeout(hideCheckoutForm, 500); 
                }, 3000);
            }
        });
    });
</script>
